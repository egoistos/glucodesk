name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: Target platform
        required: true
        default: ios
        type: choice
        options:
          - ios
          - android
          - all

jobs:
  eas-build:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
          cache: npm

      - name: Install
        run: npm ci

      - name: Mobile typecheck
        run: npm run mobile:typecheck

      - name: Build with EAS
        working-directory: apps/mobile
        run: npx eas-cli@latest build --platform "${{ inputs.platform }}" --profile "${{ inputs.profile }}" --non-interactive
